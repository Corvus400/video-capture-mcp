name: Bug report
description: Report a reproducible bug in video-capture-mcp.
title: "fix: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Package version or commit SHA.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: macOS version and hardware.
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      description: Output of python --version.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: text
