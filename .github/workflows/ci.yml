name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[test,dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy video_capture_mcp

  test-macos:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[test]"
      - run: pytest tests/ -v

  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install -U pip build twine
      - run: python -m build --sdist --wheel
      - run: twine check dist/*

  ci-gate:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-macos
      - test-build
    steps:
      - name: Require all CI jobs to pass
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] ||
             [ "${{ needs.test-macos.result }}" != "success" ] ||
             [ "${{ needs.test-build.result }}" != "success" ]
          then
            echo "lint=${{ needs.lint.result }}"
            echo "test-macos=${{ needs.test-macos.result }}"
            echo "test-build=${{ needs.test-build.result }}"
            exit 1
          fi
