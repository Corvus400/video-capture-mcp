name: release-please

on:
  push:
    branches: [main]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@0dfd8538845b8e92600d271a895a5372865d4062
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Trigger and mirror CI for release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_json="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search 'chore(main): release in:title' \
            --json headRefName,headRefOid \
            --jq '.[0] // empty')"
          if [ -z "$release_json" ]; then
            exit 0
          fi

          release_branch="$(jq -r '.headRefName' <<<"$release_json")"
          release_sha="$(jq -r '.headRefOid' <<<"$release_json")"
          gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$release_branch"

          run_id=""
          for _ in {1..12}; do
            sleep 10
            run_id="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --branch "$release_branch" \
              --event workflow_dispatch \
              --json databaseId,headSha,createdAt \
              --jq '.[] | select(.headSha == "'"$release_sha"'") | .databaseId' \
              | head -n 1)"
            if [ -n "$run_id" ]; then
              break
            fi
          done
          if [ -z "$run_id" ]; then
            echo "Could not find dispatched ci.yml run for $release_branch at $release_sha" >&2
            exit 1
          fi

          for _ in {1..90}; do
            status="$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json status --jq '.status')"
            if [ "$status" = "completed" ]; then
              break
            fi
            sleep 10
          done

          conclusion="$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json conclusion --jq '.conclusion')"
          if [ "$conclusion" != "success" ]; then
            gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log-failed || true
            echo "Dispatched release PR CI did not succeed: $conclusion" >&2
            exit 1
          fi

          run_url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$run_id"
          for context in "lint" "test-macos (3.11)" "test-macos (3.12)" "test-build"; do
            gh api "repos/$GITHUB_REPOSITORY/statuses/$release_sha" \
              -f state=success \
              -f context="$context" \
              -f target_url="$run_url" \
              -f description="ci.yml workflow_dispatch succeeded for release PR"
          done
