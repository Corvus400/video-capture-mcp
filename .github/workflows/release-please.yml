name: release-please

on:
  push:
    branches: [main]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: googleapis/release-please-action@0dfd8538845b8e92600d271a895a5372865d4062
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Trigger and mirror CI for release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/release_coordinator.py mirror-release-pr-ci --repo "$GITHUB_REPOSITORY"
      - name: Publish package channels for release commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          python scripts/release_coordinator.py publish-release
          --repo "$GITHUB_REPOSITORY"
          --sha "$GITHUB_SHA"
          --pypi-project video-capture-mcp
