name: release-please

on:
  push:
    branches: [main]

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@0dfd8538845b8e92600d271a895a5372865d4062
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Trigger CI for release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_branch="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search 'chore(main): release in:title' \
            --json headRefName \
            --jq '.[0].headRefName // ""')"
          if [ -n "$release_branch" ]; then
            gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$release_branch"
          fi
