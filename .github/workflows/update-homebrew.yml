name: update-homebrew

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Dispatch tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.version }}
        run: >
          python scripts/release_coordinator.py dispatch-homebrew-tap
          --tap-repo Corvus400/homebrew-video-capture-mcp
          --version "${RELEASE_TAG}"
